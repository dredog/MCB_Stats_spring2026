<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCB Majors League Stats 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--panel:#131720;--card:#1a2030;--border:#252d3d;--text:#e8eaf0;--muted:#5a6480;--gold:#f0b429;--blue:#4a9eff;--green:#3ecf8e;--red:#f56565;--purple:#b794f4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:14px;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1526,#131720);border-bottom:2px solid var(--gold);padding:14px 20px 0}
.hdr-top{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.tabs{display:flex;gap:2px}
.tab{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:9px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.on){color:var(--text)}
.ctrl{background:var(--panel);border-bottom:1px solid var(--border);padding:9px 20px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.ctrl input[type=text]{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:13px;padding:6px 11px;border-radius:6px;width:170px;outline:none;transition:border .15s}
.ctrl input[type=text]:focus{border-color:var(--gold)}
.ctrl select{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;padding:6px 9px;border-radius:6px;outline:none;cursor:pointer}
.flt{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 9px}
.flt label{font-size:10px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.8px;white-space:nowrap}
.flt input[type=range]{width:65px;accent-color:var(--gold)}
.flt span{font-size:12px;font-family:'Oswald',sans-serif;color:var(--gold);min-width:20px}
.note-bar{background:#1a1400;border-bottom:1px solid #3d2e00;padding:6px 20px;font-size:11px;color:#c9920a}
.tbl-wrap{overflow-x:auto;padding:0 20px 20px}
table{width:100%;border-collapse:collapse;font-family:'Oswald',sans-serif}
thead th{position:sticky;top:0;background:var(--card);padding:8px 10px;text-align:right;font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;z-index:10}
thead th:hover{color:var(--text)}
thead th.L{text-align:left}
thead th.active{color:var(--gold)}
tbody tr{border-bottom:1px solid rgba(37,45,61,.5);transition:background .1s;cursor:pointer}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:7px 10px;text-align:right;white-space:nowrap;font-size:13px}
td.L{text-align:left}
td.rk{color:var(--muted);font-size:11px;width:34px}
td.nm{font-weight:600;font-size:13px;letter-spacing:.2px}
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600}
.hi{color:var(--green);font-weight:700}
.lo{color:var(--red)}
.dim{color:var(--muted)}
.gold{color:var(--gold);font-weight:700}
.def-up{color:var(--blue);font-size:9px;vertical-align:super;display:none}
.def-dn{color:var(--red);font-size:9px;vertical-align:super}
.rs-star{color:#cc3333;font-size:9px;vertical-align:super}
.sb-na{color:var(--muted);font-size:10px;font-style:italic}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:22px;position:relative}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-name{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700}
.modal-team{font-size:12px;margin-top:2px;margin-bottom:16px}
.modal-ranks{display:flex;gap:8px;margin-bottom:16px}
.rc{flex:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px;text-align:center}
.rc-l{font-size:9px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.7px;text-transform:uppercase}
.rc-v{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--gold)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:12px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sl{font-size:10px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.sv{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600}
.sec{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin:12px 0 7px;border-bottom:1px solid var(--border);padding-bottom:5px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.qf{color:var(--green)}.qp{color:var(--gold)}.qm{color:var(--red)}

.as-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle;letter-spacing:0.3px}
.as-gold{background:#FFD700;color:#000}
.as-blue{background:#2a5caa;color:#fff}
.as-white{background:#ccc;color:#000;border:1px solid #aaa}
.as-red{background:#cc2222;color:#fff}
tr.as-gold-row td{background:rgba(255,215,0,0.10)!important}
tr.as-blue-row td{background:rgba(42,92,170,0.09)!important}
tr.as-white-row td{background:rgba(180,180,180,0.13)!important}
tr.as-red-row td{background:rgba(204,34,34,0.09)!important}
.as-filter-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;background:var(--card);color:var(--text)}
.as-filter-btn.active-gold{background:#FFD700;color:#000;border-color:#c8a800}
.as-filter-btn.active-blue{background:#2a5caa;color:#fff;border-color:#1a3c7a}
.as-filter-btn.active-white{background:#ccc;color:#000;border-color:#aaa}
.as-filter-btn.active-red{background:#cc2222;color:#fff;border-color:#991111}
</style>
<style>.hi{color:var(--green)!important}.lo{color:var(--red)!important}</style>
</head>

function pill(t){const c=TC[t]||'#aaa';return `<span class="pill" style="color:${c};background:${c}18;border:1px solid ${c}30">${t}</span>`;}

const teams=[...new Set(PLAYERS.map(p=>p.team))].sort();
const sel=document.getElementById('team');
teams.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});

let tab='ovr',sortCol=null,sortDir=-1;

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ovr','hit','pit','gl'][i]===t));
  document.getElementById('pa-flt').style.display=(t==='pit'||t==='gl')?'none':'flex';
  document.getElementById('ip-flt').style.display=(t==='hit'||t==='gl')?'none':'flex';
  document.getElementById('srch').placeholder=t==='gl'?'🔍  Search team...':'🔍  Search player or team...';
  sortCol=null;render();
}
function srt(col){sortCol===col?sortDir*=-1:(sortCol=col,sortDir=-1);render();}

function fv(v,d=3){
  if(v===null||v===undefined||isNaN(v)||v==='None'||v==='null')return'<span class="dim">—</span>';
  const n=parseFloat(v);if(isNaN(n))return'<span class="dim">—</span>';
  if(d===3)return n>=1?n.toFixed(3):'.'+String(Math.round(n*1000)).padStart(3,'0');
  return n.toFixed(d);
}
function fc(v,hi,lo,d=3,inv=false){
  if(v===null||v===undefined||isNaN(v)||v==='None')return'<span class="dim">—</span>';
  const n=parseFloat(v);if(isNaN(n))return'<span class="dim">—</span>';
  const s=d===3?fv(v):n.toFixed(d);
  let cls='';
  if(inv){cls=hi!==null&&n<=hi?'hi':lo!==null&&n>=lo?'lo':'';}
  else{cls=hi!==null&&n>=hi?'hi':lo!==null&&n<=lo?'lo':'';}
  return cls?`<span class="${cls}">${s}</span>`:s;
}
function rb(r){
  if(!r)return'<span class="dim">—</span>';
  return r<=3?`<span class="gold">${r===1?'🥇':r===2?'🥈':'🥉'}</span>`:`<span class="${r<=10?'':'dim'}">${r}</span>`;
}
function getData(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const t=document.getElementById('team').value;
  const mpa=+document.getElementById('mpa').value;
  const mip=+document.getElementById('mip').value;
  return PLAYERS.filter(p=>{
    if(t&&p.team!==t)return false;
    if(asFilter&&!((!p.allstar_color&&!p.allstar)||((p.allstar_color||p.allstar)===asFilter||(p.allstar_age||p.allstar)===asFilter)))return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.team.toLowerCase().includes(q))return false;
    if(tab==='hit'&&p.PA<mpa)return false;
    if(tab==='pit'&&(p.outs<mip*3||p.outs===0))return false;
    if(tab==='ovr'){const h=p.PA>=mpa,pi=p.outs>=mip*3&&p.outs>0;if(!h&&!pi)return false;}
    return true;
  });
}
function sortData(data){
  if(!sortCol)return data;
  return[...data].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(typeof av==='string'&&typeof bv==='string')return av.localeCompare(bv)*sortDir;
    av=parseFloat(av); bv=parseFloat(bv);
    if(isNaN(av))av=sortDir>0?999999:-999999;
    if(isNaN(bv))bv=sortDir>0?999999:-999999;
    return(av-bv)*sortDir;
  });
}
function th(key,label,cls=''){
  const ac=sortCol===key?' active':'',ar=sortCol===key?(sortDir>0?' ↑':' ↓'):'';
  return `<th class="${cls}${ac}" onclick="srt('${key}')">${label}${ar}</th>`;
}

function setAsFilter(v){
  asFilter=v;
  ['gold','blue','white','red'].forEach(k=>{
    const btn=document.getElementById('asf-'+k);
    if(btn){btn.className='as-filter-btn'+(v&&v.toLowerCase()===k?' active-'+k:'');}
  });
  const allBtn=document.getElementById('asf-all');
  if(allBtn) allBtn.style.color=v?'var(--muted)':'var(--text)';
  render();
}

function render(){
  if(tab==='gl'){renderGl();return;}
  const data=sortData(getData());
  if(tab==='hit')renderHit(data);
  else if(tab==='pit')renderPit(data);
  else renderOvr(data);
}

function defTag(p){
  return p.def_adj>=8?'<sup class="def-up">↑↑</sup>':p.def_adj>=4?'<sup class="def-up">↑</sup>':p.def_adj<=-5?'<sup class="def-dn">↓</sup>':'';
}
function rsTag(p){return p.rs_no_sb?'<sup class="rs-star">★</sup>':'';}

const AS_CLASS={'Gold':'as-gold','Blue':'as-blue','White':'as-white','Red':'as-red'};
const AS_ROW={'Gold':'as-gold-row','Blue':'as-blue-row','White':'as-white-row','Red':'as-red-row'};
function asBadge(p){if(!p.allstar)return '';return `<span class="as-badge ${AS_CLASS[p.allstar]}">${p.allstar}</span>`;}
function asRowClass(p){return p.allstar?AS_ROW[p.allstar]:'';}
let asFilter=null;


function renderOvr(data){
  const sorted=sortCol?data:[...data].sort((a,b)=>(b.ovr_score||0)-(a.ovr_score||0));
  document.getElementById('thead').innerHTML=`<tr>
    ${th('ovr_rank','#','L')}${th('name','Player','L')}${th('team','Team','L')}
    ${th('ovr_score','Score')}${th('AVG','AVG')}${th('SLG','SLG')}${th('PA','PA')}
    ${th('BB','BB')}${th('SO','K')}${th('IP','IP')}
    ${th('K6','K/6')}${th('BB6','BB/6')}${th('STR_PCT','STR%')}${th('WHIP','WHIP')}${th('ERA','ERA/6')}
  </tr>`;
  if(!sorted.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="15" class="empty">No players match</td></tr>`;return;}
  document.getElementById('tbody').innerHTML=sorted.map((p,i)=>{
    const rk=sortCol?i+1:(p.ovr_rank||i+1);
    const ip=(p.IP==='0.0'||!p.IP||p.outs===0)?'<span class="dim">—</span>':p.IP;
    return `<tr onclick="openModal('${p.name}','${p.team_key}')">
      <td class="rk L">${rb(rk)}</td>
      <td class="L nm">${p.name}${asBadge(p)}</td>
      <td class="L">${pill(p.team)}</td>
      <td class="gold">${p.ovr_score!=null?p.ovr_score:'—'}</td>
      <td>${(p.AVG>=.450?'<span class="hi">'+fv(p.AVG)+'</span>':p.AVG<=.275?'<span class="lo">'+fv(p.AVG)+'</span>':fv(p.AVG))}</td><td>${(p.SLG>=.600?'<span class="hi">'+fv(p.SLG)+'</span>':p.SLG<=.400?'<span class="lo">'+fv(p.SLG)+'</span>':fv(p.SLG))}</td>
      <td>${p.PA||0}</td>
      <td>${p.BB||0}</td><td>${p.SO||0}</td>
      <td class="dim">${ip}</td>
      <td>${(p.K6!=null?(p.K6>=10?'<span class="hi">'+p.K6.toFixed(1)+'</span>':p.K6<=7?'<span class="lo">'+p.K6.toFixed(1)+'</span>':p.K6.toFixed(1)):'--')}</td><td>${(p.BB6!=null?(p.BB6<=6?'<span class="hi">'+p.BB6.toFixed(1)+'</span>':p.BB6>=9?'<span class="lo">'+p.BB6.toFixed(1)+'</span>':p.BB6.toFixed(1)):'--')}</td><td>${p.STR_PCT&&p.STR_PCT!=='None'?parseFloat(p.STR_PCT).toFixed(1)+'%':'—'}</td>
      <td>${fv(p.WHIP)}</td>
      <td>${(p.ERA!=null?p.ERA.toFixed(2):'--')}</td>
    </tr>`;
  }).join('');
}

function renderHit(data){
  // Default sort: AVG descending
  const sorted = sortCol ? data : [...data].sort((a,b)=>(b.AVG||0)-(a.AVG||0));
  document.getElementById('thead').innerHTML=`<tr>
    ${th('AVG','#','L')}${th('name','Player','L')}${th('team','Team','L')}
    ${th('score','Score')}${th('AVG','AVG')}${th('SLG','SLG')}
    ${th('PA','PA')}${th('BB','BB')}${th('SO','K')}${th('R','R')}${th('SB','SB')}
  </tr>`;
  if(!sorted.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="11" class="empty">No hitters match</td></tr>`;return;}
  document.getElementById('tbody').innerHTML=sorted.map((p,i)=>{
    const rk=i+1;
    const sbVal=p.rs_no_sb?`<span class="sb-na">★</span>`:(p.SB||0);
    return `<tr class="${asRowClass(p)}" onclick="openModal('${p.name}','${p.team_key}')">
      <td class="rk L">${rk}</td>
      <td class="L nm">${p.name}${asBadge(p)}</td>
      <td class="L">${pill(p.team)}</td>
      <td class="gold">${p.score||'—'}</td>
      <td>${(p.AVG>=.450?'<span class="hi">'+fv(p.AVG)+'</span>':p.AVG<=.275?'<span class="lo">'+fv(p.AVG)+'</span>':fv(p.AVG))}</td><td>${(p.SLG>=.600?'<span class="hi">'+fv(p.SLG)+'</span>':p.SLG<=.400?'<span class="lo">'+fv(p.SLG)+'</span>':fv(p.SLG))}</td>
      <td>${p.PA||0}</td><td>${p.BB||0}</td><td>${p.SO||0}</td>
      <td>${p.R||0}</td><td>${sbVal}</td>
    </tr>`;
  }).join('');
}

function renderPit(data){
  // Default sort: STR% descending (higher strike% = better)
  const sorted = sortCol ? data : [...data].sort((a,b)=>{
    const av=parseFloat(a.STR_PCT)||0, bv=parseFloat(b.STR_PCT)||0;
    return bv-av;
  });
  document.getElementById('thead').innerHTML=`<tr>
    ${th('STR_PCT','#','L')}${th('name','Player','L')}${th('team','Team','L')}
    ${th('IP','IP')}${th('K6','K/6')}${th('BB6','BB/6')}${th('H6','H/6')}
    ${th('STR_PCT','STR%')}${th('ERA','ERA')}
  </tr>`;
  if(!sorted.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="9" class="empty">No pitchers match</td></tr>`;return;}
  document.getElementById('tbody').innerHTML=sorted.map((p,i)=>{
    const rk=i+1;
    const outs=p.outs||0;
    const ipStr=`${Math.floor(outs/3)}.${outs%3}`;
    const sp=p.STR_PCT&&p.STR_PCT!=='None'&&p.STR_PCT!==null?`${parseFloat(p.STR_PCT).toFixed(1)}%`:'<span class="dim">—</span>';
    return `<tr class="${asRowClass(p)}" onclick="openModal('${p.name}','${p.team_key}')">
      <td class="rk L">${rk}</td>
      <td class="L nm">${p.name}${asBadge(p)}</td>
      <td class="L">${pill(p.team)}</td>
      <td class="dim">${ipStr}</td>
      <td>${(p.K6!=null?(p.K6>=10?'<span class="hi">'+p.K6.toFixed(1)+'</span>':p.K6<=7?'<span class="lo">'+p.K6.toFixed(1)+'</span>':p.K6.toFixed(1)):'--')}</td>
      <td>${(p.BB6!=null?(p.BB6<=6?'<span class="hi">'+p.BB6.toFixed(1)+'</span>':p.BB6>=9?'<span class="lo">'+p.BB6.toFixed(1)+'</span>':p.BB6.toFixed(1)):'--')}</td>
      <td>${p.H6!==null&&p.H6!==undefined?parseFloat(p.H6).toFixed(1):'<span class="dim">—</span>'}</td>
      <td>${sp}</td>
      <td>${(p.ERA!=null?p.ERA.toFixed(2):'--')}</td>
    </tr>`;
  }).join('');
}
// ── All-star filter + badge overrides ────────────────────────────────────
(function(){
  window._asColorFilter = null;
  window._asAgeFilter   = null;

  function _applyFilter(p){
    var cf=window._asColorFilter, af=window._asAgeFilter;
    if(!cf&&!af)return true;
    if(!p.allstar)return false;
    var col=p.allstar_color||p.allstar;
    var age=p.allstar_age||'';
    if(cf&&af)return col===cf&&age===af;
    if(cf)return col===cf;
    if(af)return age===af;
    return true;
  }

  function _patch(){
    if(typeof getData==='function'){
      var _orig=getData;
      window.getData=function(){
        if(!window._asColorFilter&&!window._asAgeFilter)return _orig();
        var prev=window.asFilter; window.asFilter=null;
        var all=_orig(); window.asFilter=prev;
        return all.filter(_applyFilter);
      };
    }
    window.setAsFilter=function(v){
      var AGE_VALS={U10:1,U11:1,'9U':1,'10U':1,'11U':1,'12U':1};
      if(!v){
        window._asColorFilter=null;window._asAgeFilter=null;window.asFilter=null;
      }else if(AGE_VALS[v]){
        window._asAgeFilter=(window._asAgeFilter===v)?null:v;
        window.asFilter=window._asAgeFilter;
      }else{
        window._asColorFilter=(window._asColorFilter===v)?null:v;
        window.asFilter=window._asColorFilter;
      }
      document.querySelectorAll('.as-filter-btn').forEach(function(b){
        var bv=b.dataset&&b.dataset.filter;
        if(!bv)return;
        var on=(bv===window._asColorFilter)||(bv===window._asAgeFilter);
        ['gold','blue','white','red'].forEach(function(k){b.classList.remove('active-'+k);});
        if(on){
          var found=false;
          ['gold','blue','white','red'].forEach(function(k){
            if(bv.toLowerCase()===k){b.classList.add('active-'+k);found=true;}
          });
          if(!found)b.classList.add('active-gold');
        }
      });
      render();
    };
    window.asBadge=function(p){
      if(!p.allstar)return '';
      var col=p.allstar_color||p.allstar;
      var age=p.allstar_age;
      var cls=(typeof AS_CLASS!=='undefined'&&AS_CLASS[p.allstar])||('as-'+col.toLowerCase());
      var label=age?col:(col+' Sox');
      var a=age?'<span style="font-size:9px;opacity:.65;margin-left:3px">'+age+'</span>':'';
      return '<span class="as-badge '+cls+'">'+label+a+'</span>';
    };
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',_patch);
  }else{_patch();}
})();
function filterTeam(v){
  document.getElementById("team").value=v;
  render();
}
(function(){  var _origGetData=getData;  getData=function(tab,tf,sf,sd){    var cols=_origGetData(tab,tf,sf,sd);    cols.forEach(function(c){      if(c.key==="IP"){        c.sortKey="ip_val";      }    });    return cols;  };})();

  var sel = document.getElementById("team");

  render();

    if(ths[i].textContent.trim()==="RATING"){ ths[i].click(); break; }
  }
  // Patch Teams tab button to show team totals view
  var _st=window.setTab;
  window.setTab=function(t){
    var tv=document.getElementById("teams-view");
    var tw=document.querySelector(".tbl-wrap");
    var ctrl=document.querySelector(".ctrl");
    if(t==="teams"){
      if(tv)tv.style.display="block";

      document.querySelectorAll(".tab").forEach(function(b){
        b.classList.toggle("on",b.textContent.trim()==="Teams");

      renderTeams();

      if(tv)tv.style.display="none";
      if(tw)tw.style.display="";
      if(ctrl)ctrl.style.display="";
      if(_st)_st(t);
    }
  };
});
function renderTeams(){
  var tv=document.getElementById('teams-view');
  var players=window._PJS||[];
  if(!players.length){tv.innerHTML='<p style="color:var(--muted);padding:20px">No data loaded.</p>';return;}
  if(!window._teamSort)window._teamSort={k:'hitRtg',d:-1};
  var ts=window._teamSort;
  var teams={};
  players.forEach(function(p){
    var t=p.team;
    if(!teams[t])teams[t]={name:t,ab:0,h:0,bb:0,so:0,sb:0,tb:0,pa:0,hbp:0,r:0,d2:0,d3:0,hr:0,outs:0,strikes:0,pitches:0,sop:0,bbp:0,ratings:[],pitRatings:[]};
    var d=teams[t];
    d.ab+=p.AB||0;d.h+=p.H||0;d.bb+=p.BB||0;d.so+=p.SO||0;
    d.sb+=p.SB||0;d.tb+=p.TB||0;d.pa+=p.PA||0;d.hbp+=p.HBP||0;
    d.r+=p.R||0;d.d2+=p['2B']||0;d.d3+=p['3B']||0;d.hr+=p.HR||0;
    if((p.PA||0)>=8)d.ratings.push(p.score||0);
    if((p.outs||0)>=9&&p.gpt_pit_score!=null){
      d.outs+=p.outs||0;d.strikes+=p.pit_strikes||0;d.pitches+=p.pit_pitches||0;
      d.sop+=p.pit_SO||0;d.bbp+=p.pit_BB||0;d.pitRatings.push(p.gpt_pit_score);
    }
  });
  var rows=Object.values(teams).filter(function(d){return d.pa>0;});
  rows.forEach(function(d){
    d.avg=d.ab>0?d.h/d.ab:0;d.slg=d.ab>0?d.tb/d.ab:0;
    d.obp=d.pa>0?(d.h+d.bb+d.hbp)/d.pa:0;
    d.kpct=d.pa>0?d.so/d.pa:0;d.bbpct=d.pa>0?d.bb/d.pa:0;
    d.strpct=d.pitches>0?d.strikes/d.pitches*100:null;
    d.hitRtg=d.ratings.length?d.ratings.reduce(function(a,b){return a+b;},0)/d.ratings.length:0;
    d.pitRtg=d.pitRatings.length?d.pitRatings.reduce(function(a,b){return a+b;},0)/d.pitRatings.length:0;
    d.ipDisp=d.outs>0?Math.floor(d.outs/3)+'.'+(d.outs%3):'--';
  });
  var f3=function(v){return v!=null?('.'+Math.round(v*1000).toString().padStart(3,'0')):'--';};
  var f1=function(v){return v!=null?v.toFixed(1):'--';};
  var fp=function(v){return v!=null?(v*100).toFixed(1)+'%':'--';};
  var fr=function(v){return v>0?v.toFixed(1):'--';};
  var cols=[
    {k:'rank',lbl:'#',div:0,fmt:function(d,i){return i+1;}},
    {k:'name',lbl:'Team',div:0,fmt:function(d){return d.name;}},
    {k:'hitRtg',lbl:'Hit Rtg',div:0,fmt:function(d){return fr(d.hitRtg);}},
    {k:'avg',lbl:'AVG',div:0,fmt:function(d){return f3(d.avg);}},
    {k:'obp',lbl:'OBP',div:0,fmt:function(d){return f3(d.obp);}},
    {k:'slg',lbl:'SLG',div:0,fmt:function(d){return f3(d.slg);}},
    {k:'r',lbl:'R',div:0,fmt:function(d){return d.r;}},
    {k:'d2',lbl:'2B',div:0,fmt:function(d){return d.d2;}},
    {k:'d3',lbl:'3B',div:0,fmt:function(d){return d.d3;}},
    {k:'hr',lbl:'HR',div:0,fmt:function(d){return d.hr;}},
    {k:'kpct',lbl:'K%',div:0,fmt:function(d){return fp(d.kpct);}},
    {k:'bbpct',lbl:'BB%',div:0,fmt:function(d){return fp(d.bbpct);}},
    {k:'pitRtg',lbl:'Pit Rtg',div:1,fmt:function(d){return fr(d.pitRtg);}},
    {k:'ipDisp',lbl:'IP',div:0,fmt:function(d){return d.ipDisp;}},
    {k:'sop',lbl:'K',div:0,fmt:function(d){return d.sop;}},
    {k:'bbp',lbl:'BB',div:0,fmt:function(d){return d.bbp;}},
    {k:'strpct',lbl:'STR%',div:0,fmt:function(d){return f1(d.strpct);}},
  ];
  rows.sort(function(a,b){return ts.d*((a[ts.k]||0)-(b[ts.k]||0));});
  var th=cols.map(function(c,i){
    var al=i<=1?'left':'right';
    var bdr=c.div?'border-left:2px solid var(--border);':'';
    var bg=c.k===ts.k?'background:rgba(245,197,24,.08);':'';
    var cur=c.k==='rank'||c.k==='name'?'':'cursor:pointer;';
    var arr=c.k===ts.k?(ts.d===-1?' \u2193':' \u2191'):'';
    var oc='';
    if(c.k!=='rank'&&c.k!=='name'){
      oc=' onclick="window._teamSort.k===\''+c.k+'\'?window._teamSort.d*=-1:(window._teamSort.k=\''+c.k+'\',window._teamSort.d=-1);renderTeams()"';
    }
    return '<th style="'+bdr+bg+cur+'padding:6px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:'+al+';white-space:nowrap"'+oc+'>'+c.lbl+arr+'</th>';
  }).join('');
  var tbody=rows.map(function(d,i){
    var tds=cols.map(function(c,ci){
      var al=ci<=1?'left':'right';
      var bdr=c.div?'border-left:2px solid var(--border);':'';
      var bg=c.k===ts.k?'background:rgba(245,197,24,.05);':'';
      var fw=ci<=1?'font-weight:600;':'';
      return '<td style="'+bdr+bg+fw+'padding:5px 6px;text-align:'+al+'">'+c.fmt(d,i)+'</td>';
    }).join('');
    return '<tr style="border-bottom:0.5px solid var(--border)">'+tds+'</tr>';
  }).join('');
  tv.innerHTML='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
    '<thead><tr style="border-bottom:1px solid var(--border)">'+th+'</tr></thead>'+
    '<tbody>'+tbody+'</tbody></table></div>';
}

function renderGl(){
  document.getElementById('pa-flt').style.display='none';
  document.getElementById('ip-flt').style.display='none';
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const tf=document.getElementById('team').value;
  const gs=GAMES.filter(function(g){
    const tm=TN[g.team_key]||g.team_key;
    if(tf&&tm!==tf)return false;
    if(q&&!tm.toLowerCase().includes(q)&&!g.opponent.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('thead').innerHTML='<tr><th class="L">Team</th><th class="L">Date</th><th class="L">Opponent</th><th>RS</th><th>RA</th><th class="L">Result</th></tr>';
  document.getElementById('tbody').innerHTML=gs.map(function(g){
    const tm=TN[g.team_key]||g.team_key;
    const rs=g.score_rs!=null?g.score_rs:'--';
    const ra=g.score_opp!=null?g.score_opp:'--';
    let res='<span class="dim">--</span>';
    if(g.score_rs!=null&&g.score_opp!=null){
      if(g.score_rs>g.score_opp)res='<span class="hi">W</span>';
      else if(g.score_rs<g.score_opp)res='<span class="lo">L</span>';
      else res='T';
    }
    return '<tr><td class="L">'+pill(tm)+'</td><td class="L dim" style="font-size:12px">'+g.date+'</td><td class="L">'+g.opponent+'</td><td style="font-family:Oswald,sans-serif;font-weight:600">'+rs+'</td><td style="font-family:Oswald,sans-serif;font-weight:600">'+ra+'</td><td>'+res+'</td></tr>';
  }).join('');
}

const pmap={};
PLAYERS.forEach(function(p){pmap[p.name+'|'+p.team_key]=p;});
function openModal(name,tk){
  const p=pmap[name+'|'+tk]; if(!p)return;
  const o=p.outs||0;
  const ipS=Math.floor(o/3)+'.'+o%3;
  const hasPit=o>=9&&p.ERA!=null&&!isNaN(parseFloat(p.ERA));
  const sp=p.STR_PCT!=null?(parseFloat(p.STR_PCT).toFixed(1)+'%'):'--';
  const iso=(p.SLG-p.AVG).toFixed(3);
  const fv=function(v){if(v==null||isNaN(v))return'<span class="dim">--</span>';const n=parseFloat(v);return n>=1?n.toFixed(3):'.'+String(Math.round(n*1000)).padStart(3,'0');};
  const fc=function(v,hi,lo,d,inv){if(v==null||isNaN(v))return'<span class="dim">--</span>';const n=parseFloat(v);const s=d===3?fv(v):n.toFixed(d||2);let cls='';if(inv){cls=hi!=null&&n<=hi?'hi':lo!=null&&n>=lo?'lo':'';}else{cls=hi!=null&&n>=hi?'hi':lo!=null&&n<=lo?'lo':'';}return cls?'<span class="'+cls+'">'+s+'</span>':s;};
  const AS_CLASS={'Gold':'as-gold','Blue':'as-blue','White':'as-white','Red':'as-red','U10 Gold':'as-gold','U10 Blue':'as-blue','U10 White':'as-white','U11 Gold':'as-gold','U11 Blue':'as-blue','U11 Red':'as-red','12U Gold':'as-gold','12U White':'as-white','12U Red':'as-red'};
  const asColor=p.allstar_color||p.allstar;
  const asAge=p.allstar_age;
  const ageSfx=asAge?(' <span style="font-size:9px;opacity:.7">'+asAge+'</span>'):'';
  const asBadge=p.allstar?(' <span class="as-badge '+(AS_CLASS[p.allstar]||'as-gold')+'">'+asColor+ageSfx+'</span>'):'';
  let hitSec='<div style="color:var(--muted);font-size:12px;margin:8px 0">Insufficient batting data (min 8 PA)</div>';
  if(p.PA>=8){
    hitSec='<div class="sec">Batting</div><div class="stat-grid">'+
      '<div class="sr"><span class="sl">AVG</span><span class="sv">'+fv(p.AVG)+'</span></div>'+
      '<div class="sr"><span class="sl">SLG</span><span class="sv">'+fv(p.SLG)+'</span></div>'+
      '<div class="sr"><span class="sl">ISO</span><span class="sv">'+iso+'</span></div>'+
      '<div class="sr"><span class="sl">PA / AB</span><span class="sv">'+p.PA+' / '+p.AB+'</span></div>'+
      '<div class="sr"><span class="sl">H</span><span class="sv">'+p.H+'</span></div>'+
      '<div class="sr"><span class="sl">2B / 3B / HR</span><span class="sv">'+(p['2B']||0)+' / '+(p['3B']||0)+' / '+(p.HR||0)+'</span></div>'+
      '<div class="sr"><span class="sl">BB</span><span class="sv">'+(p.BB||0)+'</span></div>'+
      '<div class="sr"><span class="sl">K</span><span class="sv">'+(p.SO||0)+'</span></div>'+
      '<div class="sr"><span class="sl">SB</span><span class="sv">'+(p.SB||0)+'</span></div>'+
      '<div class="sr"><span class="sl">R</span><span class="sv">'+(p.R||0)+'</span></div>'+
      '<div class="sr"><span class="sl">Hit Rank</span><span class="sv" style="color:var(--gold)">'+(p.off_rank||'--')+'</span></div>'+
      '<div class="sr"><span class="sl">GPT Hit Score</span><span class="sv" style="color:var(--gold)">'+(p.gpt_hit_score!=null?parseFloat(p.gpt_hit_score).toFixed(1):'--')+'</span></div>'+
      '</div>';
  }
  let pitSec='';
  if(hasPit){
    pitSec='<div class="sec">Pitching</div><div class="stat-grid">'+
      '<div class="sr"><span class="sl">IP</span><span class="sv">'+ipS+'</span></div>'+
      '<div class="sr"><span class="sl">K</span><span class="sv">'+(p.pit_SO||0)+'</span></div>'+
      '<div class="sr"><span class="sl">Strike%</span><span class="sv" style="color:'+(p.STR_PCT!=null&&p.STR_PCT>=60?'var(--hi)':p.STR_PCT!=null&&p.STR_PCT<50?'var(--lo)':'inherit')+'">'+sp+'</span></div>'+
      '<div class="sr"><span class="sl">K/6</span><span class="sv">'+fc(p.K6,10,7,1)+'</span></div>'+
      '<div class="sr"><span class="sl">BB/6</span><span class="sv">'+fc(p.BB6,6,9,1,true)+'</span></div>'+
      '<div class="sr"><span class="sl">H/6</span><span class="sv">'+(p.H6!=null?parseFloat(p.H6).toFixed(1):'--')+'</span></div>'+
      '<div class="sr"><span class="sl">WHIP</span><span class="sv">'+(p.WHIP?parseFloat(p.WHIP).toFixed(2):'--')+'</span></div>'+
      '<div class="sr"><span class="sl">ERA/6</span><span class="sv">'+(p.ERA?parseFloat(p.ERA).toFixed(2):'--')+'</span></div>'+
      '<div class="sr"><span class="sl">BB</span><span class="sv">'+(p.pit_BB||0)+'</span></div>'+
      '<div class="sr"><span class="sl">HBP</span><span class="sv">'+(p.pit_HBP||0)+'</span></div>'+
      '<div class="sr"><span class="sl">GPT Pit Score</span><span class="sv" style="color:var(--gold)">'+(p.gpt_pit_score!=null?parseFloat(p.gpt_pit_score).toFixed(1):'--')+'</span></div>'+
      '<div class="sr"><span class="sl">Pit Rank</span><span class="sv" style="color:var(--gold)">'+(p.pit_rank||'--')+'</span></div>'+
      '</div>';
  } else if(o>0){
    pitSec='<div style="color:var(--muted);font-size:12px;margin:8px 0">'+ipS+' IP (min 3.0 for ranking)</div>';
  }
  const defNote=p.def_adj>0?(' <span style="color:var(--blue);font-size:12px">+'+p.def_adj+' def</span>'):
                p.def_adj<0?(' <span style="color:var(--red);font-size:12px">'+p.def_adj+' def</span>'):'';
  document.getElementById('modal-content').innerHTML=
    '<div class="modal-name">'+p.name+defNote+'</div>'+
    '<div class="modal-team">'+pill(p.team)+asBadge+'</div>'+
    '<div class="modal-ranks">'+
      '<div class="rc"><div class="rc-l">Overall</div><div class="rc-v">'+(p.ovr_rank||'--')+'</div></div>'+
      '<div class="rc"><div class="rc-l">Score</div><div class="rc-v">'+(p.ovr_score||'--')+'</div></div>'+
      '<div class="rc"><div class="rc-l">Hitting</div><div class="rc-v">'+(p.off_rank||'--')+'</div></div>'+
      '<div class="rc"><div class="rc-l">Pitching</div><div class="rc-v">'+(p.pit_rank||'--')+'</div></div>'+
    '</div>'+hitSec+pitSec;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
